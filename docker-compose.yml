services:
  postgres:
    image: postgres:latest
    container_name: nest-template-postgres
    restart: always
    environment:
      POSTGRES_DB: nestjs_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nest-template-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nest-template-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - nest-template-network

  redis:
    image: redis:latest
    container_name: nest-template-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - nest-template-network

  app:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/nestjs_auth?schema=public
    container_name: nest-template-app
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/nestjs_auth?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    networks:
      - nest-template-network

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  nest-template-network:
    driver: bridge
