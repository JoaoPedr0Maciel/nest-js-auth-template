name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: nestjs_auth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/nestjs_auth?schema=public
      JWT_SECRET: ci-test-secret-change-me-please
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_SECRET: ci-test-refresh-secret-change-me-please
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
